AWSTemplateFormatVersion: "2010-09-09"

Description: "BEM11 Lab - IAM automation using CloudFormation, GitSync, Groups, and Permission"

# METADATA
Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: "Password Settings"
        Parameters:
          - PasswordLength
    ParameterLabels:
      PasswordLength:
        default: "Temporary Password Length"

# PARAMETERS

Parameters:
  PasswordLength:
    Type: Number
    Default: 16
    MinValue: 12
    MaxValue: 32


# RESOURCES

Resources:

  # ── TEMP PASSWORD ───────────────────────────
  IAMTempPasswordSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub "/iam/lab/temp-password-${AWS::StackName}"
      GenerateSecretString:
        SecretStringTemplate: "{}"
        GenerateStringKey: password
        PasswordLength: !Ref PasswordLength
        ExcludeCharacters: '"@/;:,'
        RequireEachIncludedType: true

  # ── S3 GROUP ────────────────────────────────
  S3UserGroup:
    Type: AWS::IAM::Group
    Properties:
      GroupName: S3UserGroup
      Policies:
        - PolicyName: S3ListPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:ListAllMyBuckets
                  - s3:GetBucketLocation
                Resource: "*"

  # ── EC2 GROUP (FULL ACCESS) ─────────────────
  EC2UserGroup:
    Type: AWS::IAM::Group
    Properties:
      GroupName: EC2UserGroup
      Policies:
        - PolicyName: EC2FullAccessPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - ec2:DescribeInstances
                  - ec2:DescribeImages
                  - ec2:DescribeInstanceTypes
                  - ec2:DescribeSecurityGroups
                  - ec2:DescribeSubnets
                  - ec2:DescribeVpcs
                  - ec2:RunInstances
                  - ec2:CreateTags
                Resource: "*"

  # ── PERMISSION BOUNDARY (EC2 READ ONLY) ────
  EC2ReadOnlyBoundary:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: EC2ReadOnlyBoundary
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Action:
              - ec2:DescribeInstances
              - ec2:DescribeImages
              - ec2:DescribeInstanceTypes
              - ec2:DescribeSecurityGroups
              - ec2:DescribeSubnets
              - ec2:DescribeVpcs
            Resource: "*"

  # ── IAM USERS ───────────────────────────────

  EC2User1:
    Type: AWS::IAM::User
    Properties:
      UserName: ec2-user1
      Groups:
        - !Ref EC2UserGroup
      LoginProfile:
        Password: !Sub "{{resolve:secretsmanager:${IAMTempPasswordSecret}:SecretString:password}}"
        PasswordResetRequired: true

  EC2User2:
    Type: AWS::IAM::User
    Properties:
      UserName: ec2-user2
      Groups:
        - !Ref EC2UserGroup
      PermissionsBoundary: !Ref EC2ReadOnlyBoundary
      LoginProfile:
        Password: !Sub "{{resolve:secretsmanager:${IAMTempPasswordSecret}:SecretString:password}}"
        PasswordResetRequired: true

  S3User:
    Type: AWS::IAM::User
    Properties:
      UserName: s3-user
      Groups:
        - !Ref S3UserGroup
      LoginProfile:
        Password: !Sub "{{resolve:secretsmanager:${IAMTempPasswordSecret}:SecretString:password}}"
        PasswordResetRequired: true

# ──────────────────────────────────────────────
# OUTPUTS
# ──────────────────────────────────────────────
Outputs:

  TempPasswordSecretArn:
    Value: !Ref IAMTempPasswordSecret

  EC2User1:
    Value: !Ref EC2User1

  EC2User2:
    Value: !Ref EC2User2

  S3User:
    Value: !Ref S3User